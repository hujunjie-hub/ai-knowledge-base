# RSS 数据源配置
# 每个源包含 name、url、category、enabled 字段
# enabled: true 启用采集，false 暂停采集

sources:
  # ========================
  # 综合技术
  # ========================
  - name: Hacker News Best (AI)
    url: https://hnrss.org/best?q=AI+OR+ML+OR+LLM+OR+artificial+intelligence
    category: 综合技术
    enabled: false

  - name: Lobsters AI/ML
    url: https://lobste.rs/t/ai.rss
    category: 综合技术
    enabled: true

  # ========================
  # AI 研究
  # ========================
  - name: arXiv cs.AI
    url: https://rss.arxiv.org/rss/cs.AI
    category: AI 研究
    enabled: false

  # ========================
  # 公司博客
  # ========================
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    category: 公司博客
    enabled: true

  - name: Anthropic Research
    url: https://www.anthropic.com/research/feed
    category: 公司博客
    enabled: true

  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    category: 公司博客
    enabled: true

  # ========================
  # 中文社区（RSS 可用性待验证）
  # ========================
  - name: 机器之心
    url: https://www.jiqizhixin.com/rss
    category: 中文社区
    enabled: false

  - name: 量子位
    url: https://www.qbitai.com/feed
    category: 中文社区
    enabled: false

  # ========================
  # Reddit 社区
  # ========================
  - name: Reddit r/MachineLearning
    url: https://www.reddit.com/r/MachineLearning/hot.rss
    category: research
    enabled: false

  - name: Reddit r/LocalLLaMA
    url: https://www.reddit.com/r/LocalLLaMA/hot.rss
    category: open-source
    enabled: false

  # ========================
  # 行业与新闻
  # ========================
  - name: Google AI Blog
    url: https://blog.google/technology/ai/rss/
    category: industry
    enabled: true

  - name: The Verge (AI)
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: news
    enabled: false
