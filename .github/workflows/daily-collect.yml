name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *" # UTC 08:00 = 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate articles
        run: python hooks/validate_json.py knowledge/articles/

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/

      - name: Commit and push new articles
        run: |
          TODAY=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          COUNT=$(ls knowledge/articles/${TODAY}-*.json 2>/dev/null | grep -v -- -index.json | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "No new articles to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add knowledge/articles/${TODAY}-*.json knowledge/raw/
          git commit -m "feat: collect ${COUNT} articles from ${TODAY}" || echo "Nothing to commit."
          git push || echo "Push skipped (no changes or no permission)."
